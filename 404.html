<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Route Not Found · Algo Infinity Verse</title>
    <meta
      name="description"
      content="The page you're looking for doesn't exist on Algo Infinity Verse. Let's get you back on track."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        height: 100%;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        height: 100%;
        font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        background: #0a0a1a;
        color: #e4e4f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        position: relative;
        overflow-x: hidden;
      }

      /* ── Ambient background ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, rgba(196, 181, 253, 0.035) 0%, transparent 70%),
          radial-gradient(ellipse 50% 40% at 80% 80%, rgba(196, 181, 253, 0.02) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Infinity symbol (faint background signature) ── */
      .bg-symbol {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Orbitron', sans-serif;
        font-size: min(70vw, 70vh);
        font-weight: 900;
        color: rgba(196, 181, 253, 0.025);
        pointer-events: none;
        z-index: 0;
        user-select: none;
        line-height: 1;
        animation: bgFade 8s ease-in-out infinite alternate;
      }

      @keyframes bgFade {
        0% {
          opacity: 0.4;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.02);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-symbol {
          animation: none;
          opacity: 0.6;
        }
      }

      /* ── Main content ── */
      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 480px;
        width: 100%;
      }

      /* ── Error code ── */
      .error-code {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(4rem, 15vw, 8rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #ddd6fe 0%, #c4b5fd 40%, #a78bfa 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
        position: relative;
      }

      /* ── Message ── */
      .heading {
        font-family: 'Poppins', sans-serif;
        font-size: 1.15rem;
        font-weight: 500;
        color: #e4e4f0;
        margin-bottom: 0.6rem;
        line-height: 1.4;
      }

      .subtext {
        font-size: 0.88rem;
        font-weight: 300;
        color: #94a3b8;
        line-height: 1.7;
        margin-bottom: 2.5rem;
        max-width: 380px;
      }

      .subtext code {
        font-family: 'Poppins', monospace;
        font-size: 0.82rem;
        padding: 0.1em 0.45em;
        border-radius: 4px;
        background: rgba(196, 181, 253, 0.06);
        color: #c4b5fd;
        border: 1px solid rgba(196, 181, 253, 0.18);
      }

      /* ── Nav links ── */
      .nav-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.55rem 1.1rem;
        border-radius: 10px;
        font-size: 0.82rem;
        font-weight: 500;
        color: #c4b5fd;
        background: rgba(196, 181, 253, 0.04);
        border: 1px solid rgba(196, 181, 253, 0.08);
        text-decoration: none;
        transition:
          background 0.25s ease,
          border-color 0.25s ease,
          color 0.25s ease,
          transform 0.2s ease;
      }

      .nav-link:hover {
        background: rgba(196, 181, 253, 0.1);
        border-color: rgba(196, 181, 253, 0.22);
        color: #ddd6fe;
        transform: translateY(-1px);
      }

      .nav-link:active {
        transform: translateY(0);
      }

      .nav-link:focus-visible {
        outline: 2px solid #a78bfa;
        outline-offset: 2px;
      }

      .nav-link .arrow {
        font-size: 0.7rem;
        transition: transform 0.2s ease;
      }

      .nav-link:hover .arrow {
        transform: translateX(2px);
      }

      /* ── Divider ── */
      .divider {
        width: 2rem;
        height: 1px;
        background: rgba(196, 181, 253, 0.12);
        margin-bottom: 2rem;
      }

      /* ── Footer ── */
      .footer {
        font-size: 0.72rem;
        color: #4a4a6a;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        letter-spacing: 0.02em;
      }

      .footer .infinity-mark {
        font-family: 'Orbitron', sans-serif;
        font-weight: 500;
        color: #6b6b8b;
        font-size: 0.85rem;
      }

      /* ── Reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        .nav-link,
        .nav-link .arrow {
          transition: none;
        }
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        body {
          padding: 1.5rem 1rem;
        }

        .subtext {
          font-size: 0.82rem;
        }

        .nav-links {
          gap: 0.4rem;
        }

        .nav-link {
          font-size: 0.78rem;
          padding: 0.45rem 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Faint infinity symbol in background -->
    <div class="bg-symbol" aria-hidden="true">∞</div>

    <div class="content">
      <!-- Error code -->
      <div class="error-code" aria-hidden="true">404</div>

      <!-- Heading -->
      <h1 class="heading">This route doesn't exist in our graph.</h1>

      <!-- Subtext -->
      <p class="subtext">
        The page at <code id="currentPath">/unknown</code> isn't connected to anything we recognise.
        No worries —&nbsp;let's find a familiar path back.
      </p>

      <!-- Navigation links -->
      <nav class="nav-links" aria-label="Quick navigation back to the platform">
        <a href="/" class="nav-link">
          Home
          <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="/pages/practice/problems.html" class="nav-link">
          Practice
          <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="/pages/learning/algorithm-universe/algorithm-universe.html" class="nav-link">
          Topics
          <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="/#dashboard" class="nav-link">
          Dashboard
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </nav>

      <div class="divider" role="presentation"></div>

      <div class="footer">
        <span class="infinity-mark" aria-hidden="true">∞</span>
        <span>Algo Infinity Verse</span>
      </div>
    </div>

    <script>
      // Show the actual URL path the visitor tried to reach
      var pathEl = document.getElementById('currentPath');
      if (pathEl) {
        pathEl.textContent = window.location.pathname;
      }
    </script>
  </body>
</html>
