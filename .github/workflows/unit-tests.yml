name: Unit Tests

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  jest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Jest suites don't drive a browser; skip the Chromium download for speed.
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Jest unit tests
        run: npm test
