<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programming Languages — Algo Infinity Verse</title>
  <meta name="description" content="Browse all programming language learning paths. From Python and JavaScript to Rust and C — interactive tutorials for every language." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="languages.css" />

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        var p = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = t || (p ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="languages" data-no-loading>
  <div id="loading-screen" class="hidden">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Loading Languages...</h2>
    </div>
  </div>

  <main>
    <!-- HERO -->
    <section class="lang-hero">
      <div class="lang-hero-bg">
        <div class="lang-hero-glow"></div>
      </div>
      <button type="button" class="lang-back-btn" id="langBackBtn" aria-label="Go back to previous page">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </button>
      <div class="lang-hero-content">
        <h1 class="lang-hero-title" id="langHeroTitle">
          <span class="lang-title-line"><span class="lang-title-prompt">&gt;</span><span class="lang-title-text" data-content="Programming"></span></span>
          <span class="lang-title-line"><span class="lang-title-text" data-content="Languages"></span><span class="lang-title-cursor" aria-hidden="true">_</span></span>
        </h1>
        <p class="lang-hero-subtitle">
          Interactive learning paths for <strong>7</strong> programming languages — from Python's simplicity to Rust's fearless concurrency. Pick your next language and start coding.
        </p>

        <!-- SEARCH -->
        <div class="lang-search-wrapper">
          <div class="lang-search">
            <i class="fas fa-search lang-search-icon"></i>
            <input
              type="text"
              id="langSearchInput"
              class="lang-search-input"
              placeholder="Search languages..."
              aria-label="Search programming languages"
              autocomplete="off"
            />
            <button type="button" id="langClearBtn" class="lang-clear-btn" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
            <span class="lang-search-hint">⌘K</span>
          </div>
        </div>

        <!-- FILTER CHIPS -->
        <div class="lang-filters" id="langFilters" role="tablist" aria-label="Language paradigms"></div>

        <p class="lang-result-count" id="langResultCount">Showing <span id="langCountDisplay">0</span> languages</p>
      </div>
    </section>

    <!-- CARD GRID -->
    <section class="lang-section">
      <div class="lang-container">
        <div class="lang-grid" id="langGrid" role="list">
          <!-- Cards rendered by JS -->
        </div>
        <div class="lang-empty" id="langEmpty" style="display:none;">
          <i class="fas fa-search-minus"></i>
          <h3>No languages found</h3>
          <p>Try adjusting your search or filter.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script src="/theme.js"></script>
  <script src="/script.js"></script>
  <script src="languages.js"></script>
</body>
</html>
